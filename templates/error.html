<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error - NMS Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  
  <!-- favicon -->
  <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
  <meta name="theme-color" content="#0d6efd">
  
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 0;
    }
    
    .error-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 60px 40px;
      text-align: center;
      max-width: 500px;
      margin: 20px;
    }
    
    .error-icon {
      font-size: 80px;
      margin-bottom: 20px;
      color: #dc3545;
    }
    
    .error-title {
      font-size: 32px;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
    }
    
    .error-message {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .error-code {
      background: #f8f9fa;
      border-left: 4px solid #dc3545;
      padding: 15px;
      margin: 20px 0;
      text-align: left;
      border-radius: 4px;
      font-family: monospace;
      color: #555;
    }
    
    .btn-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    
    .btn-container a {
      display: inline-block;
      padding: 10px 30px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    
    .btn-home {
      background: #667eea;
      color: white;
    }
    
    .btn-home:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-reload {
      background: #6c757d;
      color: white;
    }
    
    .btn-reload:hover {
      background: #5a6268;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
    }
    
    .error-details {
      display: none;
      text-align: left;
      background: #f8f9fa;
      padding: 15px;
      border-radius: 5px;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
    
    .error-details.show {
      display: block;
    }
  </style>
</head>
<body>
  <!-- Animated glowing orbs (from main site) -->
  <div class="glow-orb glow-orb-1" style="position: fixed;"></div>
  <div class="glow-orb glow-orb-2" style="position: fixed;"></div>
  <div class="glow-orb glow-orb-3" style="position: fixed;"></div>

  <div class="error-container">
    <div class="error-icon">⚠️</div>
    
    <div class="error-title" id="errorTitle">Something Went Wrong</div>
    
    <div class="error-message" id="errorMessage">
      The page failed to load completely. This could be due to a network issue, server problem, or timeout.
    </div>
    
    <div class="error-code" id="errorCode" style="display: none;"></div>
    
    <div class="btn-container">
      <a href="/" class="btn-home">🏠 Go to Home</a>
      <a href="javascript:location.reload()" class="btn-reload">🔄 Reload Page</a>
    </div>
    
    <div class="error-details" id="errorDetails">
      <strong>Technical Details:</strong>
      <div id="detailsContent" style="margin-top: 10px; white-space: pre-wrap; word-break: break-all;"></div>
      <button class="btn btn-sm btn-outline-secondary mt-2" onclick="document.getElementById('errorDetails').classList.remove('show')">Hide</button>
    </div>
    
    <button class="btn btn-sm btn-outline-secondary mt-3" onclick="document.getElementById('errorDetails').classList.toggle('show')">Show Technical Details</button>
  </div>

  <script>
    // Parse error details from URL parameters
    function initializeErrorPage() {
      const params = new URLSearchParams(window.location.search);
      
      const errorCode = params.get('code');
      const errorMsg = params.get('message');
      const errorType = params.get('type');
      const errorDetails = params.get('details');
      
      // Set error title based on type
      const titleEl = document.getElementById('errorTitle');
      if (errorType === 'timeout') {
        titleEl.textContent = 'Page Load Timeout';
      } else if (errorType === 'network') {
        titleEl.textContent = 'Network Error';
      } else if (errorType === 'javascript') {
        titleEl.textContent = 'JavaScript Error';
      } else if (errorType === 'script') {
        titleEl.textContent = 'Script Failed to Load';
      }
      
      // Set error message
      const msgEl = document.getElementById('errorMessage');
      if (errorMsg) {
        msgEl.textContent = decodeURIComponent(errorMsg);
      }
      
      // Show error code if present
      if (errorCode) {
        document.getElementById('errorCode').style.display = 'block';
        document.getElementById('errorCode').textContent = `Error Code: ${errorCode}`;
      }
      
      // Show detailed info
      if (errorDetails) {
        document.getElementById('detailsContent').textContent = decodeURIComponent(errorDetails);
      }
    }
    
    // Initialize on page load
    window.addEventListener('load', initializeErrorPage);
    initializeErrorPage();
  </script>
</body>
</html>
