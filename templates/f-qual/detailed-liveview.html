<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detailed Liveview - NMS Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="/static/js/shared/error-handler.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- favicon (ICO) -->
  <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">

  <!-- PNG favicons as fallback / modern browsers -->
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">

  <!-- Apple touch (mobile) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">

  <!-- optional: theme color for some browsers -->
  <meta name="theme-color" content="#0d6efd">

  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 0;
    }

    .sidebar {
      width: 300px;
      background: white;
      border-right: 1px solid #ddd;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      position: relative;
      z-index: 100;
      overflow-y: auto;
      max-height: calc(100vh - 60px);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 15px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8f9fa;
    }

    .sidebar-content {
      padding: 15px;
    }

    .map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .filter-area {
      padding: 15px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .close-btn {
      cursor: pointer;
      font-size: 20px;
      color: #999;
    }

    .close-btn:hover {
      color: #333;
    }
  </style>
</head>

<body>
  <!-- Animated glowing orbs -->
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
  <div class="glow-orb glow-orb-3"></div>

  <nav class="navbar">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="/static/img/New%20folder/Picture1.png" alt="logo" style="height:24px; width:24px; margin-right:8px;" />
        <span>NMS Platform</span>
      </a>
      <ul class="nav nav-pills">
        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/f-qual/liveview">Live View</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/f-qual/alarms">Alarms</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/f-qual/playback">Playback</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/f-qual/settings">Settings</a>
        </li>
      </ul>
    </div>
  </nav>

  <main>
    <!-- Left Sidebar -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h6 class="mb-0">System Details</h6>
        <span class="close-btn" id="closeSidebar">&times;</span>
      </div>
      <div class="sidebar-content" id="sidebarContent">
        <!-- System details will be populated here -->
      </div>
    </div>

    <!-- Map Container -->
    <div class="map-container">
      <div class="filter-area">
        <label for="systemFilter" class="form-label mb-0">Select System:</label>
        <select id="systemFilter" class="form-select form-select-sm" style="width: auto; max-width: 300px;">
          <option value="">-- All Systems --</option>
        </select>
      </div>
      <div id="map"></div>
    </div>
  </main>

  <!-- Load alarm badge (runs on all pages) -->
  <script type="module" src="/static/js/f-qual/alarm-badge.js"></script>

  <!-- Load main app as ES6 module -->
  <script>window.NMS_PLATFORM = "f-qual";</script>
  <script type="module" src="/static/js/f-qual/detailed-liveview.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
