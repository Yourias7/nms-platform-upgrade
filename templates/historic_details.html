<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live View - NMS Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- favicon (ICO) -->
  <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">

  <!-- PNG favicons as fallback / modern browsers -->
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">

  <!-- Apple touch (mobile) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">

  <!-- optional: theme color for some browsers -->
  <meta name="theme-color" content="#0d6efd">
</head>

<body> 
  <!-- Animated glowing orbs -->
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
  <div class="glow-orb glow-orb-3"></div>

  <nav class="navbar mb-4">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="static\img\New folder\Picture1.png" alt="logo" style="height:24px; width:24px; margin-right:8px;" />
        <span>NMS Platform</span>
      </a>
      <ul class="nav nav-pills">
        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/liveview">Live View</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="tab-alarms" href="/alarms">Alarms</a>
        </li>
        <li class="nav-item">
        <li class="nav-item">
          <a class="nav-link active" href="/playback">Playback</a>
        </li>
        <a class="nav-link" href="/settings">Settings</a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <!-- Historic Details Content -->
     <!-- Playback Content -->
    <div class="row g-2 align-items-end mb-3">
       <div class="col-12 col-md-3" style="position: relative;">
          <label for="serialInput" class="form-label">System Name</label>
          <input id="serialInput" class="form-control" placeholder="Select or type a system name"/>
          <div id="serialOptions" class="dropdown-menu" style="position: absolute; top: 100%; left: 0; right: 0; display: none; z-index: 11; max-height: 300px; overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.15); background: rgba(10, 14, 39, 0.95); border: 1px solid rgba(102, 126, 234, 0.3);"></div>
        </div>
        <div class="col-12 col-md-3" style="width: auto;">
            <label for="startDateInput" class="form-label">Start Date</label>
            <input type="date" id="startDateInput" class="form-control" style="width: auto; position: relative; z-index: 10;" min="" max=""/>
        </div>
        <div class="col-12 col-md-3" style="width: auto;">
          <label for="endDateInput" class="form-label">End Date</label>
          <input type="date" id="endDateInput" class="form-control" style="width: auto; position: relative; z-index: 10;" min="" max=""/>
        </div>
        <div class="col-12 col-md-3" style="width: auto;">
            <button id="serialLoadBtn" class="btn btn-primary w-100" type="button">Load</button>
        </div>
        <!-- Clear Selected Button -->
        <div class="col-12 col-md-3" style="width: auto;">
            <button id="clearSelectedBtn" type="button" class="btn btn-sm btn-outline-secondary" style="width: auto; height: 38px;">
                Clear
            </button>
        </div>
        <div class="col-12 col-md-3">
            <div id="playbackMessage" class="text-muted small" style="text-align: left;"></div>
        </div>
    </div>
    <div class="row mt-2">
      <div class="col-12">
        <div class="card">
          <div class="card-body p-2 px-3">
            <h5 class="card-title">Full Historic Details</h5>
            <div class="d-flex justify-content-between mb-1">
              <div class="text-muted align-self-center">Select a system to view records.</div>
              <div>
                <a id="exportBtn" class="btn btn-sm btn-outline-primary" style="display:none" href="#" download>Export
                  CSV</a>
              </div>
            </div>
            <div id="detailsArea">Select a system to view records.</div>
          </div>
        </div>
      </div>
    </div>
    </div>
  </main>

  <!-- Load alarm badge (runs on all pages) -->
  <script type="module" src="/static/js/alarm-badge.js"></script>

  <!-- Load main app as ES6 module - it will import the others -->
  <script type="module" src="/static/js/playback.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
