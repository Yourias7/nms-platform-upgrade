<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Communication Alarms - NMS Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="/static/js/shared/error-handler.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
    <meta name="theme-color" content="#0d6efd">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>

  <body>
    <!-- Animated glowing orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>

    <nav class="navbar mb-4">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="/static/img/New%20folder/Picture1.png" alt="logo" style="height:24px; width:24px; margin-right:8px;"/>
          <span>NMS Platform</span>
        </a>

        <ul class="nav nav-pills">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/4skelion/liveview">Live View</a></li>
          <li class="nav-item"><a class="nav-link active" id="tab-alarms" href="/4skelion/alarms/summary">Alarms</a></li>
          <li class="nav-item"><a class="nav-link" href="/4skelion/playback">Playback</a></li>
          <li class="nav-item"><a class="nav-link" href="/4skelion/settings">Settings</a></li>
        </ul>
      </div>
    </nav>

    <main class="container">
      <!-- Sub tabs -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Alarms</h4>

        <ul class="nav nav-pills gap-2">
          <li class="nav-item">
            <a class="nav-link active" id="tab-alarms" href="/4skelion/alarms/summary">Alarms Summary</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/4skelion/alarms/communication">Communication</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/4skelion/alarms/performance">Performance</a>
          </li>
        </ul>
      </div>

      <!-- Content -->
        <div class="row g-2 align-items-end mb-3">
            <div class="col-12 col-md-3" style="width: auto;">
                <label for="startDateInput" class="form-label">Start Date</label>
                <input type="date" id="startDateInput" class="form-control" style="width: auto; position: relative; z-index: 10;" min="" max=""/>
            </div>
            <div class="col-12 col-md-3" style="width: auto;">
                <label for="endDateInput" class="form-label">End Date</label>
                <input type="date" id="endDateInput" class="form-control" style="width: auto; position: relative; z-index: 10;" min="" max=""/>
            </div>
            <div class="col-12 col-md-3" style="width: auto;">
                <button id="serialLoadBtn" class="btn btn-primary w-100" type="button">Load</button>
            </div>
            <div class="col-12 col-md-3" style="width: auto;">
                <button id="clearSelectedBtn" type="button" class="btn btn-sm btn-outline-secondary" style="width: auto; height: 38px;">
                    Clear
                </button>
            </div>
            <div class="col-12 col-md-3">
                <div id="alarmMessage" class="text-muted small" style="text-align: left;"></div>
            </div>
        </div>
        <div class="card" style="min-height: 600px;">
            <div class="card-body">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div>
                        <h5 class="card-title" style="margin: 0;">Alarm Rate by System</h5>
                        <p class="text-muted mb-0" style="font-size: 13px;">Percentage of alarm samples vs total samples (top 20 systems)</p>
                    </div>
                </div>
            </div>
            <div id="alarmsChartContainer" style="position: relative; height: 500px; padding: 0 20px 20px 20px;">
                <canvas id="alarmsChart"></canvas>
            </div>
        </div>
    </main>
    <!-- Alarm badge (runs on all pages) -->
    <script type="module" src="/static/js/4skelion/alarm-badge.js"></script>

    <!-- Alarm summary chart logic -->
    <script type="module" src="/static/js/4skelion/alarm-summary.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
